services:
  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - db-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/employee_eval.db
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health && python /app/scripts/verify_db.py > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:
    driver: local

networks:
  default:
    driver: bridge
